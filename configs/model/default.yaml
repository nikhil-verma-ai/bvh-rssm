# @package _global_

model:
  h_dim: 512            # GRU hidden state dimension
  z_cats: 32            # number of categorical distributions
  z_classes: 32         # classes per categorical (z_dim = z_cats * z_classes = 1024)
  n_bins: 255           # twohot bins for reward and tau heads
  symlog_lo: -20.0      # lower bound for symlog bin centers
  symlog_hi: 20.0       # upper bound for symlog bin centers
  unimix_eps: 0.01      # unimix epsilon for categorical distributions
  kl_balance: 0.8       # weight for sg(posterior)||prior term (0.8/0.2 split)
  free_bits: 1.0        # minimum KL in nats (free bits trick)
  imagination_horizon: 16  # actor-critic imagination horizon in steps
  # Validity head
  tau_max_horizon: 512  # max validity horizon in steps
  tau_kl_eps: 2.0       # KL threshold for belief expiry (nats); ablate {1,2,5}
  tau_alpha: 0.1        # weight for KL auxiliary loss in L_validity
  tau_action_k: 5       # action sequence length for phase 3 tau head
  # Hazard head
  hazard_k: 16          # number of hazard intervals
  # Causal
  cf_margin: 3          # margin for contrastive causal loss (steps); ablate {2,3,5}
  # Loss weights
  lambda_tau: 1.0
  lambda_hazard: 1.0
  lambda_cf: 0.1
